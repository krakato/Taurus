<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SearchWeb</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Source+Serif+4:opsz,wght@8..60,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body>
    <main class="page-shell">
      <section class="hero">
        <p class="eyebrow">Busqueda web</p>
        <h1>SearchWeb</h1>
        <p class="hero-copy">
          Un buscador visual con resultados web, resumen, imagen previa y enlace directo.
        </p>

        <form id="search-form" class="search-panel">
          <label class="sr-only" for="search-input">Buscar en internet</label>
          <div class="search-row">
            <input
              id="search-input"
              name="q"
              type="search"
              placeholder="Escribe palabras para buscar en internet"
              autocomplete="off"
              required
            >
            <button type="submit">Buscar</button>
          </div>
          <div class="search-actions">
            <button id="recent-searches-toggle" class="secondary-button" type="button">Ver ultimas busquedas</button>
          </div>
          <section id="recent-searches" class="recent-searches" hidden>
            <div class="recent-searches-header">
              <h2>Ultimas busquedas guardadas</h2>
            </div>
            <div id="recent-searches-list" class="recent-searches-list"></div>
          </section>
        </form>
      </section>

      <section class="results-section">
        <div id="status" class="status">Escribe una consulta para empezar.</div>
        <div id="results" class="results-grid"></div>
      </section>
    </main>

    <template id="result-template">
      <article class="result-card">
        <div class="result-media" hidden>
          <img alt="Vista previa del resultado">
        </div>
        <div class="result-body">
          <p class="result-source"></p>
          <h2 class="result-title"></h2>
          <p class="result-snippet"></p>
          <a class="result-link" target="_blank" rel="noreferrer noopener">Abrir pagina</a>
        </div>
      </article>
    </template>

    <template id="recent-search-template">
      <button class="recent-search-item" type="button">
        <span class="recent-search-query"></span>
        <span class="recent-search-meta"></span>
      </button>
    </template>

    <script src="{{ url_for('static', filename='app.js') }}" defer></script>
  </body>
</html>
